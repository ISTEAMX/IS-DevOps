name: "Continuous Release - Backend"

on:
  workflow_call:
	inputs:
	  component:
		description: 'Which component to release (e.g. backend)'
		required: true
		type: string
	  release_type:
		description: 'Semantic version bump: major, minor, or patch'
		required: true
		type: string
	secrets:
	  GIT_PAT:
		required: true

jobs:
  release:
	name: Create release (backend)
	runs-on: ubuntu-latest
	steps:
	  - name: Checkout repository
		uses: actions/checkout@v4
		with:
		  fetch-depth: 0
		  persist-credentials: true

	  - name: Ensure mvnw executable if present
		run: |
		  if [ -f ./mvnw ]; then chmod +x ./mvnw || true; fi

	  - name: Read current Maven project version
		id: current_ver
		run: |
		  set -e
		  # Try using the wrapper if present, otherwise mvn
		  if [ -f ./mvnw ]; then
			ver=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout 2>/dev/null || true)
		  else
			ver=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout 2>/dev/null || true)
		  fi
		  if [ -z "$ver" ]; then
			echo "Failed to determine project.version" >&2
			exit 1
		  fi
		  echo "current_version=$ver" >> $GITHUB_OUTPUT

	  - name: Calculate next release version
		id: bump
		run: |
		  set -e
		  current="${{ steps.current_ver.outputs.current_version }}"
		  # strip -SNAPSHOT suffix if present
		  base=${current%-SNAPSHOT}
		  IFS='.' read -r major minor patch <<< "$base"
		  if [ -z "$major" ] || [ -z "$minor" ] || [ -z "$patch" ]; then
			echo "Failed to parse current version: $current" >&2
			exit 1
		  fi
		  case "${{ inputs.release_type }}" in
			major)
			  major=$((major+1))
			  minor=0
			  patch=0
			  ;;
			minor)
			  minor=$((minor+1))
			  patch=0
			  ;;
			patch)
			  patch=$((patch+1))
			  ;;
			*)
			  echo "Invalid release_type '${{ inputs.release_type }}' - expected major/minor/patch" >&2
			  exit 1
			  ;;
		  esac
		  new="$major.$minor.$patch"
		  echo "new_version=$new" >> $GITHUB_OUTPUT
		  echo "tag_name=v$new" >> $GITHUB_OUTPUT

	  - name: Create git tag
		env:
		  TAG: ${{ steps.bump.outputs.tag_name }}
		run: |
		  set -e
		  git config user.name "github-actions[bot]"
		  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
		  # Create an annotated tag and push it
		  git tag -a "$TAG" -m "Release $TAG"
		  git push origin "$TAG"

	  - name: Create GitHub release
		uses: actions/create-release@v1
		with:
		  tag_name: ${{ steps.bump.outputs.tag_name }}
		  release_name: ${{ steps.bump.outputs.tag_name }}
		  body: |
			Automatic release generated by reusable pipeline.
			Component: ${{ inputs.component }}
			Bump: ${{ inputs.release_type }}
		  draft: false
		  prerelease: false
		env:
		  GIT_PAT: ${{ secrets.GIT_PAT }}

