name: Continuous Release - Frontend

on:
  workflow_call:
    inputs:
      component:
        description: 'Which component to release (e.g. frontend)'
        required: true
        type: string
      release_type:
        description: 'Semantic version bump: major, minor, or patch'
        required: true
        type: string

jobs:
  release:
    name: Create release (frontend)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Read current version from package.json
        id: current_ver
        run: |
          set -e
          ver=$(node -p "require('./package.json').version")
          if [ -z "$ver" ]; then
            echo "Failed to determine version from package.json" >&2
            exit 1
          fi
          echo "current_version=$ver" >> $GITHUB_OUTPUT

      - name: Calculate next release version
        id: bump
        run: |
          set -e
          current="${{ steps.current_ver.outputs.current_version }}"
          IFS='.' read -r major minor patch <<< "$current"
          if [ -z "$major" ] || [ -z "$minor" ] || [ -z "$patch" ]; then
            echo "Failed to parse current version: $current" >&2
            exit 1
          fi
          case "${{ inputs.release_type }}" in
            major)
              major=$((major+1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor+1))
              patch=0
              ;;
            patch)
              patch=$((patch+1))
              ;;
            *)
              echo "Invalid release_type '${{ inputs.release_type }}' - expected major/minor/patch" >&2
              exit 1
              ;;
          esac
          new="$major.$minor.$patch"
          echo "new_version=$new" >> $GITHUB_OUTPUT
          echo "tag_name=v$new" >> $GITHUB_OUTPUT

      - name: Create git tag
        env:
          TAG: ${{ steps.bump.outputs.tag_name }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag_name }}
          name: ${{ steps.bump.outputs.tag_name }}
          body: |
            Automatic release generated by reusable pipeline.
            Component: ${{ inputs.component }}
            Bump: ${{ inputs.release_type }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

